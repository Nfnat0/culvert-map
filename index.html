<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f3ea">
    <title>暗渠マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.css">
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="app-shell" aria-label="暗渠マップ">
      <div id="map" class="map-canvas" aria-label="地図"></div>
      <div id="mapFallback" class="map-fallback" hidden>
        <div>
          <strong>地図を読み込めませんでした</strong>
          <span>ネットワーク接続後に再読み込みしてください。</span>
        </div>
      </div>

      <header class="top-bar" aria-label="検索と現在地">
        <form id="searchForm" class="search-box" role="search">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.4-4.4m2.4-5.1a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"></path>
          </svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="暗渠名・地域名で検索" aria-label="暗渠名・地域名で検索">
        </form>
        <button id="locateButton" class="icon-button" type="button" aria-label="現在地を表示" title="現在地を表示">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 2v3m0 14v3M2 12h3m14 0h3"></path>
            <circle cx="12" cy="12" r="6"></circle>
            <circle cx="12" cy="12" r="2"></circle>
          </svg>
        </button>
        <button id="layersButton" class="icon-button" type="button" aria-expanded="false" aria-controls="layersPanel" aria-label="レイヤーを切替" title="レイヤーを切替">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m12 3 8 4.5-8 4.5-8-4.5L12 3Z"></path>
            <path d="m4 12 8 4.5 8-4.5"></path>
            <path d="m4 16.5 8 4.5 8-4.5"></path>
          </svg>
        </button>
      </header>

      <section id="searchResults" class="search-results" aria-live="polite" hidden></section>

      <section id="layersPanel" class="layers-panel" aria-label="レイヤー" hidden>
        <div class="panel-heading">
          <span>レイヤー</span>
          <button id="closeLayersButton" class="text-button" type="button">閉じる</button>
        </div>
        <fieldset>
          <legend>背景</legend>
          <label><input type="radio" name="baseLayer" value="std" checked> 標準地図</label>
          <label><input type="radio" name="baseLayer" value="pale"> 淡色地図</label>
          <label><input type="radio" name="baseLayer" value="photo"> 写真</label>
        </fieldset>
        <fieldset>
          <legend>補助</legend>
          <label><input id="terrainToggle" type="checkbox"> 地形</label>
          <label><input id="riverToggle" type="checkbox" checked> 河川参照</label>
          <label><input id="culvertToggle" type="checkbox" checked> 暗渠</label>
        </fieldset>
      </section>

      <aside id="detailSheet" class="detail-sheet" aria-label="暗渠詳細">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="detail-actions">
          <button id="favoriteButton" class="square-button" type="button" aria-label="お気に入り">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.2 6.4 20.2 7.5 14 3 9.6l6.2-.9L12 3Z"></path>
            </svg>
          </button>
          <button id="shareButton" class="square-button" type="button" aria-label="共有">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 16V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <path d="M5 13v6h14v-6"></path>
            </svg>
          </button>
        </div>
        <div id="detailContent" class="detail-content"></div>
        <div class="nearby-header">
          <h2>近くの暗渠</h2>
          <button id="fitAllButton" class="text-button" type="button">すべて表示</button>
        </div>
        <div id="nearbyList" class="nearby-list"></div>
        <footer class="attribution-strip">
          地図出典:
          <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noreferrer">地理院タイル</a>
          <span> / 一部線形:</span>
          <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap contributors</a>
          <span> / データ出典は各詳細に表示</span>
        </footer>
      </aside>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>
  </body>
</html>
